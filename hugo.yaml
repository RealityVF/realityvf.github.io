# Hugo configuration file
title: My Site

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: 博客
      pageRef: /blog
      weight: 1
    - name: 关于
      pageRef: /about
      weight: 2
    - name: 搜索
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/RealityVF/realityvf.github.io"
      params:
        icon: github

enableGitInfo: true

params:
  displayUpdatedDate: true
  dateFormat: "2026年3月5日Z00:00"

  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/RealityVF/realityvf.github.io/tree/main/content"
  
  theme:
    # light | dark | system
    default: system
    displayToggle: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover
